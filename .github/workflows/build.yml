name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'

jobs:
  # ─── Build Debug APK ───────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'debug')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Bootstrap Gradle wrapper jar (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://services.gradle.org/distributions/gradle-8.4-wrapper.jar" || \
            gradle wrapper --gradle-version=8.4
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─── Build Release APK ─────────────────────────────────────────────────────
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'release')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Bootstrap Gradle wrapper jar (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://services.gradle.org/distributions/gradle-8.4-wrapper.jar" || \
            gradle wrapper --gradle-version=8.4
          fi

      - name: Decode release keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          echo "✅ Keystore decoded"

      - name: Build Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Rename APK with version
        run: |
          APK_DIR="app/build/outputs/apk/release"
          for apk in "$APK_DIR"/*.apk; do
            mv "$apk" "$APK_DIR/LocalBusinessHelper-v${{ steps.version.outputs.name }}.apk"
          done
          ls -lh "$APK_DIR"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.version.outputs.name }}-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # Auto-create GitHub Release on version tags (v1.0.0, v1.1.0, etc.)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Local Business Helper ${{ github.ref_name }}"
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            ## 📱 Local Business Helper ${{ github.ref_name }}

            ### Installation
            1. Download `LocalBusinessHelper-${{ github.ref_name }}.apk` below
            2. On your Android phone: Settings → Security → Enable "Install unknown apps"
            3. Open the downloaded APK to install

            ### Features in this release
            - ✅ Customer management with search
            - ✅ Order tracking (Pending → Delivered)
            - ✅ Invoice & payment tracking (Paid / Unpaid / Partial)
            - ✅ Follow-up reminders with local notifications
            - ✅ Google Sheets sync (configure in Settings)
            - ✅ Offline-first — works without internet

            ### Requirements
            - Android 7.0+ (API 24+)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Validate Build Config ─────────────────────────────────────────────────
  validate:
    name: Validate Project Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Check build files exist
        run: |
          echo "Checking critical project files..."
          test -f build.gradle        && echo "✅ build.gradle"
          test -f settings.gradle     && echo "✅ settings.gradle"
          test -f app/build.gradle    && echo "✅ app/build.gradle"
          test -f app/proguard-rules.pro && echo "✅ proguard-rules.pro"
          test -f app/src/main/AndroidManifest.xml && echo "✅ AndroidManifest.xml"
          test -f gradle/wrapper/gradle-wrapper.properties && echo "✅ gradle-wrapper.properties"
          echo "All critical files present ✅"
